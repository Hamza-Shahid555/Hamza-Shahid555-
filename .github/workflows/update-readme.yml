name: Update Projects Section

on:
  schedule:
    # Runs once a day at 06:00 UTC. Adjust as you like.
    - cron: "0 6 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update projects table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: Hamza-Shahid555
        run: node scripts/update-projects.js

      - name: Commit changes if README updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update projects list"
            git push
          else
            echo "No changes to commit."
          fi
